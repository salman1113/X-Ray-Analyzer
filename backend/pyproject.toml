[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | __pycache__
  | scripts
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # do not perform function calls in default args (FastAPI Depends pattern)
    "N805",  # first arg of class method should be named `cls` (Pydantic validators use `cls`)
    "SIM108", # ternary operator (readability preference)
]

[tool.ruff.lint.isort]
known-first-party = ["core", "routes", "services"]

[tool.ruff.lint.per-file-ignores]
"scripts/*" = ["ALL"]  # training scripts — skip all lint
"**/__init__.py" = ["F401"]  # unused imports OK in __init__ files

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
